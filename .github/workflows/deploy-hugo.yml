name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build: # Derleme işi
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      # ---- YENİ ADIMLAR BAŞLANGIÇ ----
      - name: Setup Node.js # Node.js'i kurar
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Projenizin gereksinimlerine göre '20' gibi farklı bir LTS versiyonu da seçebilirsiniz.

      - name: Install Node.js dependencies # npm bağımlılıklarını kurar
        # Bu adım, postcss-cli ve tailwindcss gibi araçların package.json dosyanızda
        # devDependencies altında tanımlı olduğunu varsayar.
        run: npm ci # 'npm install' yerine 'npm ci' genellikle CI ortamlarında daha hızlı ve güvenilirdir
      # ---- YENİ ADIMLAR BİTİŞ ----

      - name: Build
        run: hugo --minify

      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'
          
  deploy: # Yayınlama işi
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4